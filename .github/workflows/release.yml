name: Release X-ui
on:
  push:
    tags:
      - 0.*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build x-ui ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            xray_zip: Xray-linux-64.zip
          - arch: arm64
            goarch: arm64
            cc_pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            xray_zip: Xray-linux-arm64-v8a.zip
          - arch: s390x
            goarch: s390x
            cc_pkg: gcc-s390x-linux-gnu
            cc: s390x-linux-gnu-gcc
            xray_zip: Xray-linux-s390x.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18'

      - name: Install cross compiler
        if: matrix.cc_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cc_pkg }}

      - name: Build and package
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          go build -o xui-release -v main.go
          mkdir x-ui
          cp xui-release x-ui/x-ui
          cp x-ui.service x-ui/x-ui.service
          cp x-ui.sh x-ui/x-ui.sh
          mkdir x-ui/bin
          cd x-ui/bin
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/${{ matrix.xray_zip }}
          unzip -q ${{ matrix.xray_zip }}
          rm -f ${{ matrix.xray_zip }} geoip.dat geosite.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          mv xray xray-linux-${{ matrix.arch }}
          cd ../..
          tar -zcvf x-ui-linux-${{ matrix.arch }}.tar.gz x-ui

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-ui-linux-${{ matrix.arch }}
          path: x-ui-linux-${{ matrix.arch }}.tar.gz

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
